<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple WhatsApp API</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-xl shadow-lg overflow-hidden transition-all">
        
        <div class="bg-green-600 text-white p-5 text-center">
            <h1 class="text-2xl font-bold">WhatsApp Setup</h1>
            <p id="status-text" class="text-sm mt-1 opacity-90">Initializing system...</p>
        </div>

        <div class="p-6">
            <div id="qr-container" class="flex flex-col items-center justify-center space-y-4 py-4">
                <p class="text-gray-600 font-medium text-center">Open WhatsApp > Linked Devices > Scan QR</p>
                <div class="w-64 h-64 border-2 border-dashed border-gray-300 rounded-lg flex items-center justify-center bg-gray-50">
                    <img id="qr-image" src="" alt="QR" class="hidden w-full h-full object-contain p-2" />
                    <div id="qr-spinner" class="animate-spin rounded-full h-10 w-10 border-b-2 border-green-600"></div>
                </div>
            </div>

            <div id="message-container" class="hidden space-y-5">
                <div class="bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-lg flex items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                    <span class="font-medium">Device Connected & Ready!</span>
                </div>

                <form id="sendMessageForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">WhatsApp Number</label>
                        <input type="text" id="phone" placeholder="919876543210 (with country code)" required
                            class="w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Message</label>
                        <textarea id="message" rows="4" placeholder="Write your message here..." required
                            class="w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition resize-none"></textarea>
                    </div>
                    <button type="submit" id="submit-btn"
                        class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded-lg shadow transition duration-200">
                        Send Message
                    </button>
                </form>
                
                <div id="response-msg" class="hidden text-sm text-center font-medium rounded-lg p-3"></div>
            </div>
            
            <div id="api-guide" class="hidden mt-6 pt-4 border-t border-gray-200">
                <p class="text-xs text-gray-500 font-semibold mb-2">HOW TO SEND VIA URL (API):</p>
                <div class="bg-gray-800 text-green-400 text-xs p-3 rounded-lg font-mono overflow-x-auto">
                    http://localhost:3000/api/send?<br/>number=919876543210&message=Hi
                </div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();

        // UI Elements
        const statusText = document.getElementById('status-text');
        const qrContainer = document.getElementById('qr-container');
        const messageContainer = document.getElementById('message-container');
        const apiGuide = document.getElementById('api-guide');
        const qrImage = document.getElementById('qr-image');
        const qrSpinner = document.getElementById('qr-spinner');
        const responseMsg = document.getElementById('response-msg');
        const submitBtn = document.getElementById('submit-btn');

        // Socket Events
        socket.on('qr', (url) => {
            statusText.textContent = "Waiting for QR scan...";
            qrSpinner.classList.add('hidden');
            qrImage.src = url;
            qrImage.classList.remove('hidden');
        });

        socket.on('ready', () => {
            statusText.textContent = "Online";
            qrContainer.classList.add('hidden');
            messageContainer.classList.remove('hidden');
            apiGuide.classList.remove('hidden');
        });

        // Form Submission
        document.getElementById('sendMessageForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Sending...';
            responseMsg.className = 'hidden text-sm text-center font-medium rounded-lg p-3 mt-4';

            try {
                const res = await fetch('/api/send-message', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        number: document.getElementById('phone').value, 
                        message: document.getElementById('message').value 
                    })
                });

                const data = await res.json();

                if (data.success) {
                    responseMsg.textContent = "✅ Message sent successfully!";
                    responseMsg.classList.add('bg-green-100', 'text-green-800');
                    document.getElementById('message').value = ''; // clear msg field only
                } else {
                    responseMsg.textContent = `❌ Error: ${data.error}`;
                    responseMsg.classList.add('bg-red-100', 'text-red-800');
                }
            } catch (err) {
                responseMsg.textContent = "❌ Network error connecting to localhost.";
                responseMsg.classList.add('bg-red-100', 'text-red-800');
            } finally {
                responseMsg.classList.remove('hidden');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Send Message';
            }
        });
    </script>
</body>
</html>
