<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Professional API</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="max-w-2xl w-full bg-white rounded-xl shadow-xl overflow-hidden transition-all">
        <div class="bg-green-600 text-white p-5 text-center flex justify-between items-center">
            <h1 class="text-2xl font-bold">WhatsApp PRO API</h1>
            <span id="status-badge" class="px-3 py-1 bg-yellow-500 text-xs font-bold rounded-full">Connecting...</span>
        </div>

        <div class="p-6">
            <div id="qr-container" class="flex flex-col items-center py-10">
                <p class="text-gray-600 mb-4 font-medium">Open WhatsApp > Linked Devices > Scan QR Code</p>
                <div class="p-4 bg-white shadow-inner rounded-xl border-2 border-dashed border-gray-300">
                    <img id="qr-image" src="" class="hidden w-64 h-64 object-contain" />
                    <div id="qr-spinner" class="animate-spin rounded-full h-12 w-12 border-b-2 border-green-600 mx-auto my-24"></div>
                </div>
            </div>

            <div id="app-container" class="hidden">
                <div class="flex border-b border-gray-200 mb-6 bg-gray-50 rounded-t-lg">
                    <button id="tab-single" class="flex-1 py-3 text-center text-green-600 border-b-2 border-green-600 font-semibold" onclick="switchTab('single')">Single Msg</button>
                    <button id="tab-bulk" class="flex-1 py-3 text-center text-gray-500 hover:text-green-600 font-semibold" onclick="switchTab('bulk')">Bulk (Manual)</button>
                    <button id="tab-file" class="flex-1 py-3 text-center text-gray-500 hover:text-green-600 font-semibold" onclick="switchTab('file')">Bulk (File Upload)</button>
                </div>

                <form id="singleForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700">Phone Number</label>
                        <input type="text" id="s-phone" placeholder="919876543210" required class="w-full mt-1 px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-green-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700">Message</label>
                        <textarea id="s-msg" rows="3" required class="w-full mt-1 px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-green-500 outline-none resize-none"></textarea>
                    </div>
                    <button type="submit" id="s-btn" class="w-full bg-green-600 text-white font-bold py-3 rounded-lg shadow hover:bg-green-700 transition">Send Message</button>
                    <div id="s-res" class="hidden text-center text-sm p-3 rounded-lg font-medium"></div>
                </form>

                <form id="bulkForm" class="space-y-4 hidden">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700">Phone Numbers (Comma/Newline)</label>
                        <textarea id="b-phones" rows="4" placeholder="919876543210&#10;919876543211" required class="w-full mt-1 px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-green-500 outline-none"></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700">Message</label>
                        <textarea id="b-msg" rows="3" required class="w-full mt-1 px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-green-500 outline-none resize-none"></textarea>
                    </div>
                    <button type="submit" id="b-btn" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg shadow hover:bg-blue-700 transition">Start Bulk Sending</button>
                </form>

                <form id="fileForm" class="space-y-5 hidden">
                    <div class="bg-blue-50 border-l-4 border-blue-500 p-4 rounded-r-lg">
                        <p class="text-sm text-blue-700 font-medium">Upload CSV or JSON. We automatically detect <b>phone_number</b> and <b>saved_name</b> columns. Use <code class="bg-blue-100 px-1 rounded">{name}</code> in your message to personalize it!</p>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Upload Database File</label>
                        <input type="file" id="f-file" accept=".csv, .json" required class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-green-50 file:text-green-700 hover:file:bg-green-100">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700">Message Template</label>
                        <textarea id="f-msg" rows="4" placeholder="Hello {name}, this is a test message!" required class="w-full mt-1 px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-green-500 outline-none resize-none"></textarea>
                    </div>
                    <button type="submit" id="f-btn" class="w-full bg-purple-600 text-white font-bold py-3 rounded-lg shadow hover:bg-purple-700 transition">Process & Send File</button>
                </form>

                <div id="progress-container" class="hidden mt-6 p-5 bg-gray-900 rounded-xl shadow-inner">
                    <div class="flex justify-between text-sm font-bold text-white mb-2">
                        <span>Transmission Status:</span>
                        <span id="p-count" class="text-green-400">0/0</span>
                    </div>
                    <div class="w-full bg-gray-700 rounded-full h-3 mb-4">
                        <div id="p-bar" class="bg-green-500 h-3 rounded-full transition-all duration-300" style="width: 0%"></div>
                    </div>
                    <ul id="p-logs" class="text-xs space-y-2 h-40 overflow-y-auto text-gray-300 font-mono bg-black p-3 rounded-lg border border-gray-700"></ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        const badge = document.getElementById('status-badge');

        socket.on('qr', (url) => {
            badge.textContent = "Waiting for Scan"; badge.className = "px-3 py-1 bg-yellow-500 text-xs font-bold rounded-full";
            document.getElementById('qr-spinner').classList.add('hidden');
            document.getElementById('qr-image').src = url;
            document.getElementById('qr-image').classList.remove('hidden');
        });

        socket.on('ready', () => {
            badge.textContent = "Connected"; badge.className = "px-3 py-1 bg-green-500 text-white text-xs font-bold rounded-full";
            document.getElementById('qr-container').classList.add('hidden');
            document.getElementById('app-container').classList.remove('hidden');
        });

        // Tab System
        function switchTab(tab) {
            const tabs = { single: 'singleForm', bulk: 'bulkForm', file: 'fileForm' };
            const btns = { single: 'tab-single', bulk: 'tab-bulk', file: 'tab-file' };
            
            Object.keys(tabs).forEach(k => {
                document.getElementById(tabs[k]).classList.add('hidden');
                document.getElementById(btns[k]).className = "flex-1 py-3 text-center text-gray-500 hover:text-green-600 font-semibold border-b border-transparent";
            });

            document.getElementById(tabs[tab]).classList.remove('hidden');
            document.getElementById(btns[tab]).className = `flex-1 py-3 text-center font-semibold border-b-2 ${tab === 'file' ? 'text-purple-600 border-purple-600' : (tab === 'bulk' ? 'text-blue-600 border-blue-600' : 'text-green-600 border-green-600')}`;
        }

        // Shared function for progress UI setup
        function initProgressUI(total, btnId) {
            document.getElementById(btnId).disabled = true;
            document.getElementById(btnId).textContent = "Processing Queue...";
            document.getElementById('progress-container').classList.remove('hidden');
            document.getElementById('p-logs').innerHTML = `<li class="text-blue-400">> Initiating transmission sequence...</li>`;
            document.getElementById('p-bar').style.width = '0%';
            document.getElementById('p-count').textContent = `0/${total}`;
        }

        // File Upload Form Submit
        document.getElementById('fileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('f-btn');
            const fileInput = document.getElementById('f-file').files[0];
            const message = document.getElementById('f-msg').value;

            btn.disabled = true; btn.textContent = "Uploading...";
            document.getElementById('progress-container').classList.add('hidden');

            const formData = new FormData();
            formData.append('file', fileInput);
            formData.append('message', message);

            try {
                const res = await fetch('/api/upload-bulk', { method: 'POST', body: formData });
                const data = await res.json();
                if(data.success) {
                    initProgressUI(data.total, 'f-btn');
                } else {
                    alert(`Error: ${data.error}`);
                    btn.disabled = false; btn.textContent = "Process & Send File";
                }
            } catch(e) {
                alert("Network Error");
                btn.disabled = false; btn.textContent = "Process & Send File";
            }
        });

        // Single & Bulk form fetch logic remains similar, routing to respective API endpoints...
        // [Existing logic for single/bulk form from previous versions, abbreviated for space, ensure they point to correct IDs]

        // Progress Socket Logs
        socket.on('bulk-progress', (data) => {
            const logs = document.getElementById('p-logs');
            document.getElementById('p-count').textContent = `${data.current}/${data.total}`;
            document.getElementById('p-bar').style.width = `${(data.current / data.total) * 100}%`;

            const li = document.createElement('li');
            const nameStr = data.name ? `[${data.name}]` : '';
            if(data.success) {
                li.innerHTML = `<span class="text-green-400">SUCCESS</span>: Message delivered to ${data.number} ${nameStr}`;
            } else {
                li.innerHTML = `<span class="text-red-400">FAILED</span>: ${data.number} - ${data.error}`;
            }
            logs.prepend(li);
        });

        socket.on('bulk-complete', (data) => {
            document.getElementById('p-logs').prepend(document.createElement('br'));
            const li = document.createElement('li');
            li.innerHTML = `<span class="text-yellow-400 text-lg">> TRANSMISSION COMPLETE: ${data.message}</span>`;
            document.getElementById('p-logs').prepend(li);
            
            // Reset buttons
            document.getElementById('f-btn').disabled = false; document.getElementById('f-btn').textContent = "Process & Send File";
            document.getElementById('b-btn').disabled = false; document.getElementById('b-btn').textContent = "Start Bulk Sending";
        });
    </script>
</body>
</html>
